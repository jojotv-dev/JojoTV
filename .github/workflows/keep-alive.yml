name: Keep Supabase Alive

on:
  schedule:
    # S'exécute tous les 3 jours à minuit
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Permet de le lancer manuellement si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -i -X GET "https://xebjezrcwmfytoeuxscq.supabase.co/rest/v1/"